# Taskfile for shpiel — HF-compatible model relay
#
# Key commands:
#   task do       - Run all quality checks (generate, format, lint, test, build)
#   task test     - Run Go tests
#   task e2e      - Run end-to-end tests with a real huggingface_hub client
#   task dev      - Bring up the Tilt dev environment
#
---
version: "3"

vars:
  CPU_COUNT:
    sh: nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo "4"
  PARALLEL_COUNT:
    sh: echo $(({{.CPU_COUNT}} * 2))
  GIT_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_TIME:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: "-X github.com/loewenthal-corp/shpiel/internal/buildinfo.Commit={{.GIT_COMMIT}} -X github.com/loewenthal-corp/shpiel/internal/buildinfo.BuildTime={{.BUILD_TIME}}"
  # Mutation-testing tool, pinned. Not a hermit package, so it is run via
  # `go run` on the hermit-pinned toolchain (keeps it out of go.mod).
  GREMLINS: "github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0"

tasks:
  do:
    desc: "Run all quality checks"
    cmds:
      - task: generate
      - task: format
      - task: lint
      - task: test
      - task: build
      # Mutation-test only what changed vs main, so a weak spot is caught
      # here (pre-push) instead of in CI. No-op when nothing Go changed.
      - task: mutation:diff

  init:
    desc: "Download Go module dependencies"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go mod download

  generate:
    desc: "Generate Go code"
    dir: "{{.TASKFILE_DIR}}"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    cmds:
      - go generate ./...

  format:
    desc: "Format the codebase"
    aliases: [f, fmt]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go fmt ./...
      - task: format:yaml

  format:yaml:
    desc: "Run the yamlfmt formatter on all yaml files (charts/ is Helm's)"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      # charts/ is excluded: templates are not valid YAML, and
      # release-please rewrites Chart.yaml in its own style every release.
      - git ls-files -co --exclude-standard '*.yaml' '*.yml' ':!charts' | xargs yamlfmt

  lint:
    desc: "Lint the codebase"
    aliases: [l]
    dir: "{{.TASKFILE_DIR}}"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "charts/**/*"
    cmds:
      - golangci-lint run ./...
      - task: lint:chart

  lint:chart:
    desc: "Lint and schema-validate the Helm chart"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - helm lint charts/shpiel --quiet
      - helm template shpiel charts/shpiel | kubeconform -strict -ignore-missing-schemas
      - helm template shpiel charts/shpiel --set persistence.data.enabled=true --set serviceMonitor.enabled=true --set hpa.enabled=true --set pdb.enabled=true | kubeconform -strict -ignore-missing-schemas

  lint:vet:
    desc: "Run go vet only"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go vet -p {{.CPU_COUNT}} ./...

  test:
    desc: "Run Go tests"
    aliases: [t]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go test -p {{.CPU_COUNT}} -parallel {{.PARALLEL_COUNT}} ./...

  test:full:
    desc: "Full test suite with race detection and coverage (CI)"
    aliases: [tfull]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go test -race -p {{.CPU_COUNT}} -parallel {{.PARALLEL_COUNT}} -cover ./...

  test:coverage-html:
    desc: "Generate HTML coverage report"
    aliases: [cov]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  mutation:
    desc: "Mutation-test the whole module with gremlins (slow; informational)"
    aliases: [mut]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go run {{.GREMLINS}} unleash {{.CLI_ARGS}}

  mutation:diff:
    desc: "Mutation-test only code changed vs main; fails on a surviving mutant"
    aliases: [mutd]
    dir: "{{.TASKFILE_DIR}}"
    vars:
      BASE: ""
    cmds:
      # gremlins --diff scopes to changed lines, but an *empty* diff makes it
      # fall back to the whole module — so skip explicitly when nothing (that
      # gremlins would mutate) changed. Excludes here mirror .gremlins.yaml.
      - |
        if [ -n "$SKIP_MUTATION" ]; then
          echo "mutation:diff: SKIP_MUTATION set; skipping."
          exit 0
        fi
        # A shallow clone (e.g. the CI `do` job's default checkout) can't
        # produce a reliable diff — gremlins would fall back to the whole
        # module. The dedicated CI mutation job fetches full history.
        if [ "$(git rev-parse --is-shallow-repository 2>/dev/null)" = "true" ]; then
          echo "mutation:diff: shallow clone; skipping (need full history to diff)."
          exit 0
        fi
        base='{{.BASE}}'
        if [ -z "$base" ]; then
          if git rev-parse --verify --quiet main >/dev/null 2>&1; then
            base=main
          elif git rev-parse --verify --quiet origin/main >/dev/null 2>&1; then
            base=origin/main
          fi
        fi
        if [ -z "$base" ] || ! git rev-parse --verify --quiet "$base" >/dev/null 2>&1; then
          echo "mutation:diff: no base ref to diff against; skipping."
          exit 0
        fi
        changed=$(git diff --name-only "$base" -- '*.go' \
          | grep -vE '(_test\.go$|^test/conformance/|^internal/fakehub/|^internal/fakeregistry/|^cmd/fakehub/)' || true)
        if [ -z "$changed" ]; then
          echo "mutation:diff: no production Go changes vs $base; skipping."
          exit 0
        fi
        echo "mutation:diff: mutating lines changed vs $base ..."
        out=$(go run {{.GREMLINS}} unleash --diff "$base" 2>&1)
        rc=$?
        printf '%s\n' "$out"
        if [ "$rc" -ne 0 ]; then
          echo "mutation:diff: gremlins exited $rc"
          exit "$rc"
        fi
        if printf '%s\n' "$out" | grep -qE '(^|[[:space:]])LIVED '; then
          echo
          echo "mutation gate FAILED: a mutant survived in changed code (see LIVED above)."
          echo "Add or strengthen a test to kill it. For a known-equivalent mutant,"
          echo "adjust the code, or bypass once with: SKIP_MUTATION=1 task do"
          exit 1
        fi
        echo "mutation:diff: all mutants in changed code were caught."

  e2e:
    desc: "Run end-to-end tests (real huggingface_hub client in Docker against shpiel)"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go test -tags e2e -count 1 -timeout 10m ./test/e2e/...

  build:
    desc: "Build all binaries"
    deps:
      - build::shpiel

  build::*:
    vars:
      BINARY_NAME: "{{index .MATCH 0}}"
    dir: "{{.TASKFILE_DIR}}"
    desc: "Build the {{.BINARY_NAME}} binary"
    sources:
      - "internal/**/*.go"
      - "cmd/{{.BINARY_NAME}}/**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "dist/{{.BINARY_NAME}}"
    cmds:
      - CGO_ENABLED=0 go build -ldflags '{{.LDFLAGS}}' -o dist/{{.BINARY_NAME}} ./cmd/{{.BINARY_NAME}}

  release:snapshot:
    desc: "Dry-run the GoReleaser build locally (no publishing)"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - goreleaser release --snapshot --clean

  dev:
    desc: "Bring up the Tilt dev environment (requires a local k8s cluster)"
    cmds:
      - tilt up

  website:install:
    desc: "Install website dependencies (hermit provides node + pnpm)"
    dir: "{{.TASKFILE_DIR}}/website"
    sources:
      - "package.json"
      - "pnpm-lock.yaml"
    cmds:
      - pnpm install --frozen-lockfile

  website:dev:
    desc: "Run shpiel.dev locally (wrangler dev on :8787)"
    dir: "{{.TASKFILE_DIR}}/website"
    deps: ['website:install']
    cmds:
      - pnpm exec wrangler dev

  website:check:
    desc: "Typecheck the website worker and validate the deploy bundle"
    dir: "{{.TASKFILE_DIR}}/website"
    deps: ['website:install']
    cmds:
      - pnpm exec tsc --noEmit
      - pnpm exec wrangler deploy --dry-run

  website:deploy:
    desc: "Deploy shpiel.dev to Cloudflare Workers"
    dir: "{{.TASKFILE_DIR}}/website"
    deps: ['website:install']
    cmds:
      - pnpm exec wrangler deploy

  clean:
    desc: "Clean build artifacts and test cache"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go clean -testcache
      - rm -rf dist/ coverage.out coverage.html
