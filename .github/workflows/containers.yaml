---
name: containers

"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
  pull_request:
    paths:
      - "containers/**"
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/containers.yaml"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Derive commit metadata
        id: commit
        # The commit timestamp (not wall clock) keeps builds reproducible
        # and layer-cache friendly across re-runs of the same commit.
        run: |
          echo "time=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=branch,suffix=-{{sha}}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=shpiel
            org.opencontainers.image.description=HF-to-OCI model relay: Hugging Face Hub API in, OCI artifacts out

      - name: Set up QEMU for cross-builds
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build (and push, off PRs) multi-arch image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: containers/shpiel.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ steps.commit.outputs.short }}
            BUILD_TIME=${{ steps.commit.outputs.time }}
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=shpiel
          cache-to: type=gha,mode=max,scope=shpiel
