---
name: ci

"on":
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  CI: "true"

jobs:
  do:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Activate Hermit
        uses: cashapp/activate-hermit@e49f5cb4dd64ff0b0b659d1d8df499595451155a # v1
        with:
          cache: "true"

      - name: Run quality checks
        run: task do

      - name: Run full test suite with race detection
        run: task test:full

      - name: Verify generated files are committed
        run: git diff --exit-code

  e2e:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Activate Hermit
        uses: cashapp/activate-hermit@e49f5cb4dd64ff0b0b659d1d8df499595451155a # v1
        with:
          cache: "true"

      - name: Run end-to-end tests (real huggingface_hub client)
        run: task e2e
        env:
          SHPIEL_E2E_REQUIRE: "1"

  check:
    if: always()
    needs:
      - do
      - e2e
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
