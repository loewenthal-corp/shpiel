---
name: website

"on":
  workflow_dispatch:
  pull_request:
    paths: ["website/**", ".github/workflows/website.yaml"]
  push:
    branches: ["main"]
    paths: ["website/**", ".github/workflows/website.yaml"]

permissions:
  contents: read

# Deploys are handled by Cloudflare Workers Builds (repo connected in
# the Cloudflare dashboard, path /website): production deploys on main,
# preview versions with PR comments on other branches. This workflow
# only typechecks, so the repo stays green without Cloudflare secrets.
jobs:
  check:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Activate Hermit
        uses: cashapp/activate-hermit@cea9af7913204a965fd488637a8d1811bba2e616 # v1
        with:
          cache: "true"

      - name: Typecheck and validate the deploy bundle
        run: task website:check
