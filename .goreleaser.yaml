# GoReleaser builds the release binaries. Division of labor with the rest
# of the release automation: release-please cuts the tag, the GitHub
# release, and the notes; the containers workflow builds multi-arch
# images; the release workflow publishes the Helm chart. GoReleaser only
# attaches cross-platform binary archives and checksums to the release
# release-please already created.
#
# yamlfmt: ignore
---
version: 2

builds:
  - id: shpiel
    main: ./cmd/shpiel
    binary: shpiel
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/loewenthal-corp/shpiel/internal/buildinfo.Version={{.Version}}
      - -X github.com/loewenthal-corp/shpiel/internal/buildinfo.Commit={{.ShortCommit}}
      - -X github.com/loewenthal-corp/shpiel/internal/buildinfo.BuildTime={{.CommitDate}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: shpiel
    formats: [tar.gz]
    name_template: "shpiel_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - config.example.yaml

checksum:
  name_template: checksums.txt

changelog:
  # release-please owns the release notes.
  disable: true

release:
  # Attach artifacts to the release release-please created; never touch
  # its notes.
  mode: keep-existing
