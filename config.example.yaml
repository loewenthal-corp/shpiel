# Shpiel configuration reference. Everything here has a sensible default;
# an empty file plus one backend and one route is a working server.
# Precedence: CLI flags > SHPIEL_* env vars > this file > defaults.
#
# Validate with: shpiel config validate config.yaml
---
listen:
  api: ":8080"
  # admin: ":8081"        # admin API (v1.x), disabled unless set
  metrics: ":9090" # Prometheus /metrics, disabled if empty

limits:
  max_concurrent_uploads: 64
  max_concurrent_downloads: 512
  per_conn_buffer_mb: 8

upstream:
  huggingface:
    endpoint: https://huggingface.co
    # Env var holding the org token used for upstream fetches; researchers
    # never see this credential.
    token_env: HF_ORG_TOKEN
    # On cache miss, fetch from upstream, persist to the routed backend,
    # then serve. The MatrixHub-killer feature.
    pull_through: true
    # How long a cached branch/tag resolution is served before
    # revalidating upstream. Commit SHAs are immutable and never
    # revalidated. 0 revalidates on every request.
    refresh_interval: 5m

backends:
  # OCI registry backend (Zot, Harbor, GHCR, ...): one OCI repository per
  # model, one manifest per commit (tagged by SHA), refs as tags, one
  # layer per file.
  #   zot:
  #     type: oci
  #     url: https://zot.internal:5000
  #     # modelpack: raw per-file layers, modctl-style (default).
  #     # tar-layers: standard OCI image with tar layers — mountable via
  #     # Kubernetes image volumes and P2P-distributable by Spegel.
  #     format: tar-layers
  #     repo_prefix: ""            # optional path prefix for OCI repo names
  #     auth: { username_env: ZOT_USER, password_env: ZOT_PASS }
  # S3-compatible object storage (AWS S3, GCS interop, MinIO, Ceph, R2):
  # content-addressed blobs plus manifest/ref objects under
  # [prefix/]models/org/name/. Credentials come from the named env vars,
  # falling back to AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY /
  # AWS_SESSION_TOKEN; requests go unsigned when those are empty too.
  #   archive:
  #     type: s3
  #     bucket: models-archive
  #     region: us-east-1              # SigV4 region; required for AWS
  #     # endpoint: https://minio.internal:9000  # S3-compatible services
  #     #                                        # (path-style addressing)
  #     # prefix: shpiel               # key prefix, for sharing a bucket
  #     # auth:
  #     #   access_key_id_env: ARCHIVE_ACCESS_KEY_ID
  #     #   secret_access_key_env: ARCHIVE_SECRET_ACCESS_KEY
  cache:
    type: fs
    # HF-cache-compatible layout: mount this path (PVC/NFS) into pods and
    # point HF_HUB_CACHE at it for HF_HUB_OFFLINE=1 consumption.
    path: /var/lib/shpiel

routes:
  # First match wins. Globs use "/" between owner and name; "*" alone
  # matches everything. Replicas receive pushes asynchronously through the
  # replication queue (primary is acknowledged synchronously).
  # - match: "exigence/*"
  #   primary: zot
  #   replicas: [archive]
  - match: "*"
    primary: cache

# Async fan-out to route replicas: a disk-spooled retry queue, restart-safe
# with no database. Required when any route declares replicas.
replication:
  # spool_dir: /var/lib/shpiel-replication
  workers: 4

auth:
  mode: none # none | passthrough (local, oidc: v1.x)
  cache_ttl: 5m

# Admin API (replication status, backend health, config view) on its own
# listener — enable by setting listen.admin above plus a token:
admin:
# token_env: SHPIEL_ADMIN_TOKEN   # required with listen.admin; requests
#                                 # use Authorization: Bearer <token>

# Xet protocol support: with it on, huggingface_hub 1.x uploads work with
# no client-side flags (hub 1.x has no LFS fallback), and hf_xet clients
# download chunk-level through the reconstruction API. Ingested files are
# always also materialized into the routed backend, so non-xet clients and
# all backends serve them normally.
xet:
  enabled: false
  # data_dir: /var/lib/shpiel-xet   # required when enabled; xorbs + records

log:
  level: info # debug | info | warn | error
  format: json # json | text
  # Append-only audit stream (JSON lines) of writes and admin actions:
  # who/what/when/digest. "-" writes to stderr; empty disables.
  # audit_path: /var/log/shpiel/audit.log
