---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fakehub
  labels:
    app.kubernetes.io/name: fakehub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fakehub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fakehub
    spec:
      containers:
        - name: fakehub
          image: fakehub
          ports:
            - name: http
              containerPort: 8081
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
