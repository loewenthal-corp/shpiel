# Dev-cluster shpiel config: pull-through from the in-cluster fakehub so
# the whole environment is hermetic (no public internet), landing weights
# in the in-cluster Zot as mountable tar-layer OCI artifacts — the
# flagship Spegel-ready deployment shape.
---
listen:
  api: ":8080"
  metrics: ":9090"

upstream:
  huggingface:
    endpoint: http://fakehub.shpiel-dev.svc.cluster.local:8081
    pull_through: true
    refresh_interval: 1m

backends:
  zot:
    type: oci
    url: http://zot.shpiel-dev.svc.cluster.local:5000
    format: tar-layers

routes:
  - match: "*"
    primary: zot

xet:
  enabled: true
  data_dir: /var/lib/shpiel-xet

auth:
  mode: none

log:
  level: debug
  format: text
