---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shpiel.fullname" . }}-config
  labels:
    {{- include "shpiel.labels" . | nindent 4 }}
data:
  # Rendered verbatim from .Values.config: the chart values ARE the Shpiel
  # config file, no translation layer.
  config.yaml: |
    {{- toYaml .Values.config | nindent 4 }}
